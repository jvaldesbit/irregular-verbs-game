server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Astro static output: cada ruta es un directorio con index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Datos JSON: sin caché para que los cambios se vean de inmediato
    location /data/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets estáticos: caché agresivo
    location ~* \.(js|css|svg|ico|woff|woff2|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
}
